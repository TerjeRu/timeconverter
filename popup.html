<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header svg {
      flex-shrink: 0;
    }

    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .site-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .site-host {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      word-break: break-all;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.active { background: #4ade80; }
    .status-dot.inactive { background: #f87171; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-danger {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .btn-danger:hover { background: rgba(248, 113, 113, 0.25); }

    .unsupported {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    .settings-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 12px;
    }

    .settings-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    <h1>Time Converter</h1>
  </div>

  <div id="content">
    <div class="site-info">
      <div class="site-host" id="siteHost">Loading...</div>
      <div class="status" id="status"></div>
      <button class="btn" id="toggleBtn" style="display:none;"></button>
    </div>
  </div>

  <div id="unsupported" style="display:none;" class="unsupported">
    This page is not supported.
  </div>

  <a href="#" id="settingsLink" class="settings-link">Extension Settings</a>

  <script src="popup.js"></script>
</body>
</html>
